server {
    listen 80;
    server_name defight.aima.studio;

    # Client (Next.js)
    location / {
        proxy_pass http://localhost:5800;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # API and WebSocket (Express + Socket.IO)
    # We use a regex location to catch both /api and /socket.io
    # But for simplicity, we can split them or just forward specific paths.
    
    # Forward API requests
    location /api/ {
        # Rewrite /api/foo -> /foo to match Express routes if they don't have /api prefix
        # Check if your express app uses /api router or root router.
        # Based on index.ts, it uses root middleware, so we might need rewrite.
        # However, usually it's safer to keep /api if the backend expects it, or rewrite if not.
        # Inspecting index.ts: app.post("/auth/request-nonce") -> NO /api prefix.
        # So we MUST rewrite /api/foo -> /foo
        rewrite ^/api/(.*) /$1 break;
        
        proxy_pass http://localhost:5801;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Forward Socket.IO requests
    location /socket.io/ {
        proxy_pass http://localhost:5801;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
